<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design Audit Agent Upload</title>
  <style>
    body { margin: 0; background: #f7f8fb; color: #1f2933; font-family: Segoe UI, Arial, sans-serif; }
    main { max-width: 920px; margin: 0 auto; padding: 32px 20px; }
    h1 { margin: 0 0 20px; }
    section { background: #fff; border: 1px solid #dbe2ea; border-radius: 8px; padding: 18px; margin-bottom: 18px; }
    label { display: block; font-weight: 700; margin: 12px 0 6px; }
    input, button { font: inherit; }
    button { margin-top: 14px; padding: 9px 14px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
    pre { white-space: pre-wrap; background: #111827; color: #f9fafb; padding: 14px; border-radius: 8px; min-height: 80px; overflow: auto; }
  </style>
</head>
<body>
<main>
  <h1>Design Audit Agent</h1>

  <section>
    <h2>Level 1: Single Screenshot Audit</h2>
    <form id="analyze-form">
      <label for="single-file">Screenshot</label>
      <input id="single-file" name="file" type="file" accept="image/png,image/jpeg,image/webp" required>
      <button type="submit">Analyze</button>
    </form>
  </section>

  <section>
    <h2>Level 2: Before / After Compare</h2>
    <form id="compare-form">
      <label for="baseline-file">Baseline screenshot</label>
      <input id="baseline-file" name="baseline" type="file" accept="image/png,image/jpeg,image/webp" required>
      <label for="current-file">Current screenshot</label>
      <input id="current-file" name="current" type="file" accept="image/png,image/jpeg,image/webp" required>
      <button type="submit">Compare</button>
    </form>
  </section>

  <section>
    <h2>Response</h2>
    <pre id="result">Upload an image to begin.</pre>
  </section>
</main>
<script>
  const result = document.getElementById("result");

  async function postForm(url, form) {
    result.textContent = "Working...";
    const response = await fetch(url, { method: "POST", body: new FormData(form) });
    const json = await response.json();
    result.textContent = JSON.stringify(json, null, 2);
  }

  document.getElementById("analyze-form").addEventListener("submit", (event) => {
    event.preventDefault();
    postForm("/api/v1/analyze", event.currentTarget).catch((error) => {
      result.textContent = error.message;
    });
  });

  document.getElementById("compare-form").addEventListener("submit", (event) => {
    event.preventDefault();
    postForm("/api/v1/compare", event.currentTarget).catch((error) => {
      result.textContent = error.message;
    });
  });
</script>
</body>
</html>
